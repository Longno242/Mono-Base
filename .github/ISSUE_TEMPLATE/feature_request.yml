name: Feature request
description: Suggest something for the base template
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests should be useful for the **base template**, not a specific game mod.
        For game-specific stuff, fork the repo instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing or annoying right now?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you'd want
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Overlay / ImGui
        - Graphics backend (D3D11/12/OpenGL/Vulkan)
        - Mono resolver / helpers
        - Hooks / MinHook
        - Build / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
          required: false
